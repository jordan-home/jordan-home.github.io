<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 - Jordan の Words</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #fafafa; }
    .container { text-align: center; padding: 2rem; }
    h1 { font-size: 5rem; margin: 0; color: #66CDAA; }
    p { color: #666; font-size: 1.2rem; }
    a { color: #66CDAA; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p>页面不存在，正在跳转...</p>
    <p><a href="/">← 返回首页</a></p>
  </div>
  <script>
    (function() {
      var path = window.location.pathname;
      // Strip the .html if present, then redirect to VuePress hash route
      // e.g. /technology/graphqlchu-tan.html -> /#/technology/graphqlchu-tan
      // e.g. /technology/GraphQL-ru-men-shi-zhan -> /#/technology/graphqlchu-tan
      // Since we can't know the mapping, just redirect to root and let Vue handle it
      // OR: try adding .html and redirect to hash
      var normalizedPath = path.endsWith('.html') ? path.slice(0, -5) : path;
      var hashRoute = normalizedPath + window.location.search;
      window.location.replace('/#' + (hashRoute.startsWith('/') ? hashRoute : '/' + hashRoute));
    })();
  </script>
</body>
</html>
