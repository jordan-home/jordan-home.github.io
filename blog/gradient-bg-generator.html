<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>渐变晕染背景生成器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f5f4; min-height: 100vh; padding: 16px 12px 60px; }
  .container { max-width: 860px; margin: 0 auto; }
  h1 { text-align: center; color: #2a9d8f; font-size: 20px; font-weight: 600; margin-bottom: 2px; }
  .subtitle { text-align: center; color: #999; font-size: 11px; margin-bottom: 16px; }
  .main-card { background: white; border-radius: 16px; padding: 20px 16px; box-shadow: 0 4px 20px rgba(42,157,143,0.1); margin-bottom: 14px; }

  /* 移动端适配：色块数+按钮 分两行 */
  .input-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
  .input-group { display: flex; align-items: center; gap: 5px; }
  .input-group label { font-size: 12px; color: #555; white-space: nowrap; }
  .num-input { width: 58px; border: 1.5px solid #b2dfdb; border-radius: 8px; padding: 6px 8px; font-size: 13px; text-align: center; outline: none; color: #333; }
  .gen-btn { background: linear-gradient(135deg, #2a9d8f, #3dc9bf); color: white; border: none; border-radius: 10px; padding: 8px 16px; font-size: 12px; font-weight: 600; cursor: pointer; flex-shrink: 0; }
  .gen-btn:hover { box-shadow: 0 4px 14px rgba(42,157,143,0.35); }
  .seed-info { font-size: 10px; color: #bbb; width: 100%; margin-top: 2px; }

  /* 比例选项 - 移动端也够宽 */
  .size-preset { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  .size-preset button { flex: 1; min-width: 58px; padding: 7px 6px; border: 1.5px solid #b2dfdb; border-radius: 8px; background: white; font-size: 11px; color: #2a9d8f; cursor: pointer; white-space: nowrap; }
  .size-preset button.active, .size-preset button:hover { background: linear-gradient(135deg, #2a9d8f, #3dc9bf); color: white; border-color: transparent; }

  canvas { display: block; width: 100%; height: auto; border-radius: 12px; box-shadow: 0 2px 14px rgba(42,157,143,0.12); }
  .action-row { display: flex; gap: 10px; justify-content: center; margin-top: 12px; }
  .dl-btn { background: white; border: 1.5px solid #2a9d8f; color: #2a9d8f; border-radius: 10px; padding: 8px 18px; font-size: 12px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 5px; }
  .dl-btn:hover { background: #2a9d8f; color: white; }
  .tips { font-size: 10px; color: #ccc; text-align: center; margin-top: 8px; }
  .hint { text-align: center; padding: 50px 20px; color: #ccc; font-size: 13px; }

  @media (max-width: 480px) {
    h1 { font-size: 18px; }
    .main-card { padding: 16px 12px; border-radius: 12px; }
    .input-row { gap: 6px; }
    .num-input { width: 52px; padding: 5px 6px; font-size: 12px; }
    .gen-btn { padding: 7px 12px; font-size: 11px; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>🌫️ 渐变晕染背景生成器</h1>
  <p class="subtitle">柔和朦胧 · 三原色随机晕染 · 适合做界面背景和壁纸</p>
  <div class="main-card">
    <div class="input-row">
      <div class="input-group">
        <label>色块数</label>
        <input type="number" id="blobCount" class="num-input" value="8" min="3" max="30">
      </div>
      <button class="gen-btn" onclick="regenerate()">🎲 重新生成</button>
    </div>
    <div class="seed-info" id="seedInfo">种子: —</div>
    <div class="size-preset">
      <button onclick="setSize(3,4,this)">3:4</button>
      <button onclick="setSize(4,3,this)">4:3</button>
      <button onclick="setSize(9,16,this)" class="active">9:16</button>
      <button onclick="setSize(16,9,this)">16:9</button>
      <button onclick="setSize(1,1,this)">1:1</button>
    </div>
    <div id="hint" class="hint">点击「重新生成」开始</div>
    <canvas id="bgCanvas" width="540" height="960" style="display:none"></canvas>
    <div class="action-row">
      <button class="dl-btn" onclick="downloadImg()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        下载 PNG
      </button>
    </div>
    <p class="tips">生成基于时间戳种子，同一时刻唯一，不同时间完全不同</p>
  </div>
</div>
<script>
var cW=540,cH=960;
function setSize(ratio,h,btn){
  var map={3:{w:540,h:720},4:{w:720,h:540},9:{w:540,h:960},16:{w:960,h:540},1:{w:720,h:720}};
  var s=map[ratio]||map[9];cW=s.w;cH=s.h;
  var cv=document.getElementById('bgCanvas');cv.width=cW;cv.height=cH;
  document.querySelectorAll('.size-preset button').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');regenerate();
}
function regenerate(){generateSoftBackground(parseInt(document.getElementById('blobCount').value)||8);}
function generateSoftBackground(X){
  var canvas=document.getElementById('bgCanvas'),ctx=canvas.getContext('2d'),w=canvas.width,h=canvas.height,seed=Date.now();
  document.getElementById('seedInfo').textContent='种子: '+seed;
  var rand=function(m){var x=Math.sin(seed*m+seed*0.001)*10000;return x-Math.floor(x);};
  ctx.fillStyle='#f8f8f8';ctx.fillRect(0,0,w,h);
  for(var i=0;i<X;i++){
    var ri=120+Math.floor(rand(i*7.3+1)*115),gi=100+Math.floor(rand(i*7.3+2)*120),bi=90+Math.floor(rand(i*7.3+3)*125);
    var xi=rand(i*7.3+4)*w,yi=rand(i*7.3+5)*h,maxR=Math.min(w,h)*(0.12+rand(i*7.3+6)*0.3),alpha=0.18+rand(i*7.3+7)*0.22;
    var g=ctx.createRadialGradient(xi,yi,0,xi,yi,maxR);
    g.addColorStop(0,'rgba('+ri+','+gi+','+bi+','+alpha+')');
    g.addColorStop(0.45,'rgba('+ri+','+gi+','+bi+','+(alpha*0.45)+')');
    g.addColorStop(1,'rgba('+ri+','+gi+','+bi+',0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(xi,yi,maxR,0,Math.PI*2);ctx.fill();
  }
  ctx.globalCompositeOperation='screen';
  for(var i=0;i<Math.floor(X/2);i++){
    var ri=150+Math.floor(rand((i+50)*6.1+1)*105),gi=130+Math.floor(rand((i+50)*6.1+2)*110),bi=110+Math.floor(rand((i+50)*6.1+3)*115);
    var xi=rand((i+50)*6.1+4)*w,yi=rand((i+50)*6.1+5)*h,maxR=Math.min(w,h)*(0.2+rand((i+50)*6.1+6)*0.4),alpha=0.12+rand((i+50)*6.1+7)*0.15;
    var g=ctx.createRadialGradient(xi,yi,0,xi,yi,maxR);
    g.addColorStop(0,'rgba('+ri+','+gi+','+bi+','+alpha+')');g.addColorStop(1,'rgba('+ri+','+gi+','+bi+',0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(xi,yi,maxR,0,Math.PI*2);ctx.fill();
  }
  ctx.globalCompositeOperation='source-over';
  document.getElementById('hint').style.display='none';canvas.style.display='block';
}
function downloadImg(){var ts=Date.now(),link=document.createElement('a');link.download='gradient-bg-'+ts+'.png';link.href=document.getElementById('bgCanvas').toDataURL('image/png');link.click();}
regenerate();
</script>
</body>
</html>
