<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>阿德勒自卑感测评 — 3分钟自测</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #faf9f7;
    min-height: 100vh;
    padding: 20px;
    color: #333;
  }
  .container { max-width: 560px; margin: 0 auto; }

  .header {
    text-align: center;
    padding: 24px 0 16px;
  }
  .header h1 {
    font-size: 22px;
    color: #2d2d2d;
    margin-bottom: 8px;
  }
  .header p {
    font-size: 13px;
    color: #999;
    line-height: 1.5;
  }

  .intro-card {
    background: white;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: 0 1px 8px rgba(0,0,0,0.05);
  }
  .intro-card h2 {
    font-size: 15px;
    color: #555;
    margin-bottom: 10px;
  }
  .intro-card ul {
    list-style: none;
    font-size: 13px;
    color: #777;
    line-height: 1.8;
  }
  .intro-card li::before { content: '· '; }

  .progress-bar {
    background: #f0f0f0;
    border-radius: 4px;
    height: 4px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .progress-bar .fill {
    height: 100%;
    background: linear-gradient(90deg, #6366f1, #8b5cf6);
    border-radius: 4px;
    transition: width 0.3s ease;
    width: 0%;
  }

  .question-card {
    background: white;
    border-radius: 16px;
    padding: 24px 20px;
    margin-bottom: 12px;
    box-shadow: 0 1px 8px rgba(0,0,0,0.05);
    display: none;
  }
  .question-card.active { display: block; }

  .q-number {
    font-size: 11px;
    color: #aaa;
    margin-bottom: 8px;
  }
  .q-text {
    font-size: 16px;
    color: #333;
    line-height: 1.6;
    margin-bottom: 20px;
    font-weight: 500;
  }
  .q-text span { font-size: 12px; color: #bbb; font-weight: 400; }

  .option {
    display: block;
    width: 100%;
    text-align: left;
    padding: 12px 16px;
    border: 1.5px solid #eee;
    border-radius: 10px;
    margin-bottom: 8px;
    font-size: 14px;
    color: #555;
    cursor: pointer;
    transition: all 0.15s;
    background: white;
  }
  .option:hover { border-color: #6366f1; color: #6366f1; }
  .option.selected {
    border-color: #6366f1;
    background: #f0f0ff;
    color: #4338ca;
    font-weight: 500;
  }

  .nav-btns {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }
  .btn {
    flex: 1;
    padding: 13px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: transform 0.1s;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn-next {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: white;
  }
  .btn-prev {
    background: #f5f5f5;
    color: #999;
  }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Result */
  .result-card {
    background: white;
    border-radius: 16px;
    padding: 28px 24px;
    box-shadow: 0 2px 16px rgba(99,102,241,0.12);
    display: none;
    text-align: center;
  }
  .result-card.show { display: block; }

  .result-type {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 6px;
    color: #2d2d2d;
  }
  .result-score {
    font-size: 13px;
    color: #999;
    margin-bottom: 16px;
  }
  .result-bar-bg {
    background: #f0f0f0;
    border-radius: 8px;
    height: 10px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .result-bar-fill {
    height: 100%;
    border-radius: 8px;
    background: linear-gradient(90deg, #6366f1, #8b5cf6);
    transition: width 1s ease;
  }
  .result-desc {
    font-size: 14px;
    color: #666;
    line-height: 1.7;
    text-align: left;
    margin-bottom: 16px;
    padding: 14px;
    background: #faf9ff;
    border-radius: 10px;
  }
  .result-tip {
    font-size: 13px;
    color: #888;
    line-height: 1.6;
    text-align: left;
    padding: 14px;
    background: #fff9f0;
    border-radius: 10px;
  }
  .result-tip strong { color: #d97706; }

  .retest-btn {
    margin-top: 16px;
    width: 100%;
    padding: 13px;
    background: #f5f5f5;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    color: #888;
    cursor: pointer;
  }

  .start-screen { text-align: center; padding: 40px 0; }
  .start-screen p { font-size: 14px; color: #999; line-height: 1.7; margin-bottom: 24px; }
  .start-btn {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 14px 40px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(99,102,241,0.25);
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🔮 阿德勒自卑感测评</h1>
    <p>基于阿尔弗雷德·阿德勒个体心理学<br>3分钟 · 8道题 · 了解你的自卑模式</p>
  </div>

  <!-- Start Screen -->
  <div id="startScreen" class="intro-card">
    <div class="start-screen">
      <p>阿德勒认为：<strong>自卑感是所有人都有的普遍心理</strong>，<br>
      关键不在于你有没有自卑感，而在于你用哪种方式应对它。<br><br>
      这个测评帮助你识别自己的自卑模式，<br>
      从而有针对性地做出改变。</p>
      <button class="start-btn" onclick="startQuiz()">开始测评 →</button>
    </div>
  </div>

  <!-- Questions -->
  <div id="questionScreen" style="display:none">
    <div class="intro-card" style="padding:14px 20px">
      <div style="display:flex;justify-content:space-between;font-size:12px;color:#bbb">
        <span id="qProgress">1/8</span>
        <span id="qPercent">0%</span>
      </div>
      <div class="progress-bar"><div class="fill" id="progressFill"></div></div>
    </div>

    <div id="questionsContainer"></div>

    <div class="nav-btns">
      <button class="btn btn-prev" id="prevBtn" onclick="prevQ()" disabled>← 上题</button>
      <button class="btn btn-next" id="nextBtn" onclick="nextQ()" disabled>下一题 →</button>
    </div>
  </div>

  <!-- Result -->
  <div class="result-card" id="resultCard">
    <div class="result-type" id="resultType"></div>
    <div class="result-score" id="resultScore"></div>
    <div class="result-bar-bg"><div class="result-bar-fill" id="resultBar"></div></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="result-tip" id="resultTip"></div>
    <button class="retest-btn" onclick="resetQuiz()">← 重新测评</button>
  </div>
</div>

<script>
const questions = [
  {
    text: '当别人取得成就时，你的第一反应通常是？',
    sub: '根据直觉选择',
    options: [
      { text: '真厉害，我也想努力达到', score: 1 },
      { text: '没什么了不起的，我觉得我也能', score: 3 },
      { text: '有点羡慕，但觉得和自己没关系', score: 2 },
      { text: '不舒服，有点酸酸的感觉', score: 4 }
    ]
  },
  {
    text: '面对一个完全陌生的社交场合，你会？',
    sub: '想象最常见的反应',
    options: [
      { text: '主动和周围人搭话，很快融入', score: 1 },
      { text: '先观察一会儿，等别人来找我', score: 2 },
      { text: '尽量待在不显眼的位置', score: 3 },
      { text: '能不去就不去，找借口离开', score: 4 }
    ]
  },
  {
    text: '别人给你真诚的赞美时，你会？',
    sub: '最真实的反应',
    options: [
      { text: '开心地接受，谢谢对方', score: 1 },
      { text: '嘴上说谢谢，但心里觉得对方只是客气', score: 3 },
      { text: '不知道说什么，有点尴尬', score: 2 },
      { text: '觉得对方在说反话，暗讽我', score: 4 }
    ]
  },
  {
    text: '你在工作中犯了一个不小的错误，你会？',
    sub: '第一反应',
    options: [
      { text: '马上承认，立刻想办法补救', score: 1 },
      { text: '先想办法掩盖，不能让别人知道', score: 3 },
      { text: '反复回想为什么会犯，陷入自责', score: 4 },
      { text: '告诉自己下次小心点，没什么大不了', score: 2 }
    ]
  },
  {
    text: '你和伴侣/密友发生了一次激烈争吵，你会？',
    sub: '吵完之后',
    options: [
      { text: '冷静后主动和好，分析问题出在哪', score: 1 },
      { text: '等对方来道歉，我不会先低头', score: 3 },
      { text: '算了，忍一忍就过去了', score: 2 },
      { text: '陷入"ta是不是不爱我了"的反复怀疑', score: 4 }
    ]
  },
  {
    text: '你看到一个很优秀的人，你心里会想？',
    sub: '最本能的念头',
    options: [
      { text: '我要向他学习，让自己变得更好', score: 1 },
      { text: '他肯定有什么我没看到的问题', score: 2 },
      { text: '我要找机会超过ta', score: 3 },
      { text: '我怎么努力也比不上ta，算了吧', score: 4 }
    ]
  },
  {
    text: '回顾你的人生，你最常有的感觉是？',
    sub: '没有对错',
    options: [
      { text: '虽然辛苦，但一直在进步', score: 1 },
      { text: '总是在比较，总觉得差别人一点', score: 3 },
      { text: '平平淡淡，没什么特别的感觉', score: 2 },
      { text: '好像一直在追赶什么，却不知道终点在哪', score: 4 }
    ]
  },
  {
    text: '如果用一句话形容你应对自卑的方式，最接近的是？',
    sub: '选择最符合你的',
    options: [
      { text: '我把自卑感当成动力，越不足越努力', score: 1 },
      { text: '我选择回避，做自己擅长的事就好', score: 2 },
      { text: '我会伪装强大，让别人觉得我很好', score: 3 },
      { text: '我觉得自己就是不够好，也不想改变了', score: 4 }
    ]
  }
];

let currentQ = 0;
let answers = [];

function startQuiz() {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('questionScreen').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  const container = document.getElementById('questionsContainer');
  container.innerHTML = `
    <div class="question-card active">
      <div class="q-number">${currentQ + 1} / ${questions.length}</div>
      <div class="q-text">${q.text}<br><span>${q.sub}</span></div>
      ${q.options.map((o, i) => `
        <button class="option${answers[currentQ] === i ? ' selected' : ''}" onclick="selectOption(${i})">${o.text}</button>
      `).join('')}
    </div>
  `;
  updateProgress();
  updateNavBtns();
}

function selectOption(idx) {
  answers[currentQ] = idx;
  renderQuestion();
}

function updateProgress() {
  const pct = Math.round((currentQ / questions.length) * 100);
  document.getElementById('qProgress').textContent = `${currentQ + 1}/${questions.length}`;
  document.getElementById('qPercent').textContent = `${pct}%`;
  document.getElementById('progressFill').style.width = `${pct}%`;
}

function updateNavBtns() {
  document.getElementById('prevBtn').disabled = currentQ === 0;
  document.getElementById('nextBtn').disabled = answers[currentQ] === undefined;
  document.getElementById('nextBtn').textContent =
    currentQ === questions.length - 1 ? '查看结果 →' : '下一题 →';
}

function nextQ() {
  if (answers[currentQ] === undefined) return;
  if (currentQ < questions.length - 1) {
    currentQ++;
    renderQuestion();
  } else {
    showResult();
  }
}

function prevQ() {
  if (currentQ > 0) {
    currentQ--;
    renderQuestion();
  }
}

function showResult() {
  const total = answers.reduce((sum, ansIdx, qi) => {
    return sum + questions[qi].options[ansIdx].score;
  }, 0);
  const max = questions.length * 4;
  const pct = Math.round((total / max) * 100);

  let type, desc, tip;
  if (pct <= 30) {
    type = '🌟 超越型应对者';
    desc = `你的自卑感总分：${total}/${max}分，自卑感水平偏低。<br><br>
    你已经内化了一种健康的自我评价体系——你知道自己的价值不取决于别人怎么看，也不需要靠优越感来支撑。这种状态在阿德勒看来是「自我超越」的体现。`;
    tip = `📌 <strong>阿德勒的提醒：</strong>你已经很接近「社会兴趣」高的状态——既能接纳自己的不足，又能在共同体中感受到自己的价值。继续保持这份觉知，同时注意不要因为「自己状态好」而产生新的优越感需求。`;
  } else if (pct <= 55) {
    type = '🌿 正常型应对者';
    desc = `你的自卑感总分：${total}/${max}分，处于正常区间。<br><br>
    你和阿德勒描述的大多数人一样：有一定自卑感，但能以相对健康的方式转化它。你会在某些场景下感到不足，但不会让这种感受主导你的行为。`;
    tip = `📌 <strong>阿德勒的提醒：</strong>关键是觉察「补偿行为」的边界——当努力变成过度补偿，当谦虚变成自我贬低，你就已经偏离了健康的转化路径。每天给自己10分钟不加评判地观察内心，会很有帮助。`;
  } else if (pct <= 75) {
    type = '⚡ 过度补偿型';
    desc = `你的自卑感总分：${total}/${max}分，自卑感比较明显。<br><br>
    你可能经常感觉自己「不够好」，但你选择的应对方式是主动出击——用行动、成就、甚至攻击性来掩盖这种感觉。阿德勒认为适度的过度补偿是创造力的来源，但过头了会变成「优越情结」。`;
    tip = `📌 <strong>阿德勒的提醒：</strong>试试减少「证明自己」的行为，增加「纯粹因为喜欢而做」的时刻。当你发现自己做事的第一动机是「我不能输」而不是「我想做好」时，自卑感可能正在操控你。`;
  } else {
    type = '🌑 回避/沉溺型';
    desc = `你的自卑感总分：${total}/${max}分，自卑感已经明显影响生活。<br><br>
    你更倾向于用回避或沉溺来应对自卑——要么躲开展开竞争的机会，要么陷入反复的自我怀疑而无法行动。阿德勒说这是「生活风格」出了问题，需要刻意练习来重建新的反应模式。`;
    tip = `📌 <strong>阿德勒的提醒：</strong>自卑感本身不是问题，它是你「想要改变」的信号。不要试图消除自卑感，而是把它当成方向标——每次感到自卑时，问自己：「我真正想改变的是什么，我能做什么具体的事？」而不是「我为什么这么差」。`;
  }

  document.getElementById('questionScreen').style.display = 'none';
  document.getElementById('resultCard').classList.add('show');
  document.getElementById('resultType').textContent = type;
  document.getElementById('resultScore').textContent = `自卑感综合指数：${pct}分（越高＝自卑感影响越大）`;
  document.getElementById('resultBar').style.width = `${pct}%`;
  document.getElementById('resultDesc').innerHTML = desc;
  document.getElementById('resultTip').innerHTML = tip;
}

function resetQuiz() {
  currentQ = 0;
  answers = [];
  document.getElementById('resultCard').classList.remove('show');
  document.getElementById('questionScreen').style.display = 'none';
  document.getElementById('startScreen').style.display = 'block';
}
</script>
</body>
</html>
