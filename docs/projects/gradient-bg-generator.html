<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>渐变晕染背景生成器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #f0f5f4;
    min-height: 100vh;
    padding: 24px 16px 60px;
  }
  .container {
    max-width: 860px;
    margin: 0 auto;
  }
  h1 {
    text-align: center;
    color: #2a9d8f;
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .subtitle {
    text-align: center;
    color: #888;
    font-size: 13px;
    margin-bottom: 24px;
  }
  .main-card {
    background: white;
    border-radius: 20px;
    padding: 28px;
    box-shadow: 0 4px 24px rgba(42, 157, 143, 0.1);
    margin-bottom: 20px;
  }
  .input-row {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 20px;
  }
  .input-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .input-group label {
    font-size: 14px;
    color: #555;
    white-space: nowrap;
  }
  .num-input {
    width: 72px;
    border: 1.5px solid #b2dfdb;
    border-radius: 10px;
    padding: 8px 12px;
    font-size: 15px;
    text-align: center;
    outline: none;
    color: #333;
    transition: border-color 0.2s;
  }
  .num-input:focus { border-color: #2a9d8f; }
  .seed-info {
    font-size: 11px;
    color: #bbb;
    flex: 1;
    text-align: right;
  }
  .generate-btn {
    background: linear-gradient(135deg, #2a9d8f, #3dc9bf);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 10px 24px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.2s;
  }
  .generate-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(42, 157, 143, 0.35);
  }
  .generate-btn:active { transform: translateY(0); }
  .canvas-wrapper {
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 2px 16px rgba(42, 157, 143, 0.12);
    margin-bottom: 16px;
    position: relative;
  }
  canvas {
    display: block;
    width: 100%;
    height: auto;
  }
  .size-preset {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .size-preset button {
    flex: 1;
    min-width: 80px;
    padding: 7px 12px;
    border: 1.5px solid #b2dfdb;
    border-radius: 8px;
    background: white;
    font-size: 12px;
    color: #2a9d8f;
    cursor: pointer;
    transition: all 0.15s;
  }
  .size-preset button.active,
  .size-preset button:hover {
    background: linear-gradient(135deg, #2a9d8f, #3dc9bf);
    color: white;
    border-color: transparent;
  }
  .action-row {
    display: flex;
    gap: 10px;
    justify-content: center;
  }
  .dl-btn {
    background: white;
    border: 1.5px solid #2a9d8f;
    color: #2a9d8f;
    border-radius: 10px;
    padding: 9px 20px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .dl-btn:hover {
    background: #2a9d8f;
    color: white;
  }
  .tips {
    font-size: 11px;
    color: #aaa;
    text-align: center;
    margin-top: 10px;
  }
  .placeholder-hint {
    text-align: center;
    padding: 60px 20px;
    color: #ccc;
    font-size: 14px;
  }
</style>
</head>
<body>
<div class="container">
  <h1>🌫️ 渐变晕染背景生成器</h1>
  <p class="subtitle">柔和朦胧 · 三原色随机晕染 · 适合做界面背景和壁纸</p>

  <div class="main-card">
    <div class="input-row">
      <div class="input-group">
        <label>色块数量</label>
        <input type="number" id="blobCount" class="num-input" value="8" min="3" max="30">
      </div>
      <button class="generate-btn" onclick="regenerate()">🎲 重新生成</button>
      <span class="seed-info" id="seedInfo">每次生成唯一</span>
    </div>

    <div class="size-preset">
      <button onclick="setSize(800, 450, this)" class="active">800×450</button>
      <button onclick="setSize(1080, 608, this)">1080×608</button>
      <button onclick="setSize(1080, 1920, this)">1080×1920</button>
      <button onclick="setSize(1920, 1080, this)">1920×1080</button>
    </div>

    <div class="canvas-wrapper">
      <div class="placeholder-hint" id="placeholder">点击上方「重新生成」按钮开始生成</div>
      <canvas id="bgCanvas" width="800" height="450" style="display:none"></canvas>
    </div>

    <div class="action-row">
      <button class="dl-btn" onclick="downloadImg()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        下载 PNG
      </button>
    </div>
    <p class="tips">生成结果基于时间戳种子，同一时刻唯一，不同时间完全不同</p>
  </div>
</div>

<script>
let currentW = 800, currentH = 450;

function setSize(w, h, btn) {
  currentW = w; currentH = h;
  const canvas = document.getElementById('bgCanvas');
  canvas.width = w; canvas.height = h;
  document.querySelectorAll('.size-preset button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  regenerate();
}

function regenerate() {
  const X = parseInt(document.getElementById('blobCount').value) || 8;
  generateSoftBackground(X);
}

function generateSoftBackground(X) {
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');
  const w = canvas.width;
  const h = canvas.height;

  // 时间戳作为种子
  const seed = Date.now();
  document.getElementById('seedInfo').textContent = '种子: ' + seed;

  const rand = (mul) => {
    // 线性同余伪随机，基于时间戳种子
    const x = Math.sin(seed * mul + seed * 0.001) * 10000;
    return x - Math.floor(x);
  };

  // 底色：柔和浅灰白
  ctx.fillStyle = '#f9f9f9';
  ctx.fillRect(0, 0, w, h);

  // 绘制多个柔和渐变色块
  for (let i = 0; i < X; i++) {
    const ri = 140 + Math.floor(rand(i * 7.3 + 1) * 80);
    const gi = 140 + Math.floor(rand(i * 7.3 + 2) * 80);
    const bi = 140 + Math.floor(rand(i * 7.3 + 3) * 80);

    const xi = rand(i * 7.3 + 4) * w;
    const yi = rand(i * 7.3 + 5) * h;
    const maxR = Math.min(w, h) * (0.15 + rand(i * 7.3 + 6) * 0.35);
    const alpha = 0.08 + rand(i * 7.3 + 7) * 0.12;

    // 径向渐变
    const grad = ctx.createRadialGradient(xi, yi, 0, xi, yi, maxR);
    grad.addColorStop(0, `rgba(${ri},${gi},${bi},${alpha})`);
    grad.addColorStop(0.5, `rgba(${ri},${gi},${bi},${alpha * 0.5})`);
    grad.addColorStop(1, `rgba(${ri},${gi},${bi}, 0)`);

    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(xi, yi, maxR, 0, Math.PI * 2);
    ctx.fill();
  }

  // 再叠加一层更柔和的混合层
  ctx.globalCompositeOperation = 'screen';
  for (let i = 0; i < Math.floor(X / 2); i++) {
    const ri = 160 + Math.floor(rand((i + 50) * 6.1 + 1) * 70);
    const gi = 160 + Math.floor(rand((i + 50) * 6.1 + 2) * 70);
    const bi = 160 + Math.floor(rand((i + 50) * 6.1 + 3) * 70);

    const xi = rand((i + 50) * 6.1 + 4) * w;
    const yi = rand((i + 50) * 6.1 + 5) * h;
    const maxR = Math.min(w, h) * (0.25 + rand((i + 50) * 6.1 + 6) * 0.4);
    const alpha = 0.04 + rand((i + 50) * 6.1 + 7) * 0.06;

    const grad = ctx.createRadialGradient(xi, yi, 0, xi, yi, maxR);
    grad.addColorStop(0, `rgba(${ri},${gi},${bi},${alpha})`);
    grad.addColorStop(1, `rgba(${ri},${gi},${bi}, 0)`);

    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(xi, yi, maxR, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalCompositeOperation = 'source-over';

  document.getElementById('placeholder').style.display = 'none';
  canvas.style.display = 'block';
}

function downloadImg() {
  const canvas = document.getElementById('bgCanvas');
  const ts = Date.now();
  const link = document.createElement('a');
  link.download = `gradient-bg-${ts}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}
</script>
</body>
</html>
