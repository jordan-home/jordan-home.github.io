<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>荣格阴影人格测试｜测测你压抑的另一面</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #1a1a2e;
    min-height: 100vh;
    padding: 20px;
    color: #eee;
  }
  .container { max-width: 560px; margin: 0 auto; }

  /* 封面 */
  .cover {
    text-align: center;
    padding: 40px 0 30px;
  }
  .cover-icon {
    font-size: 56px;
    margin-bottom: 16px;
    display: block;
  }
  .cover h1 {
    font-size: 26px;
    font-weight: 800;
    background: linear-gradient(135deg, #a78bfa, #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 10px;
    line-height: 1.3;
  }
  .cover .subtitle {
    font-size: 14px;
    color: #9ca3af;
    margin-bottom: 24px;
    line-height: 1.6;
  }
  .start-btn {
    background: linear-gradient(135deg, #7c3aed, #db2777);
    color: white;
    border: none;
    border-radius: 14px;
    padding: 16px 40px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(124,58,237,0.4);
  }
  .start-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 28px rgba(124,58,237,0.55);
  }

  /* 问题卡片 */
  .quiz-card { display: none; }
  .quiz-card.active { display: block; }
  .progress {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 24px;
  }
  .progress-bar-bg {
    flex: 1;
    height: 6px;
    background: #2d2d4a;
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #7c3aed, #f472b6);
    border-radius: 3px;
    transition: width 0.4s ease;
  }
  .progress-text {
    font-size: 12px;
    color: #6b7280;
    min-width: 36px;
    text-align: right;
  }
  .question-card {
    background: #16162a;
    border: 1px solid #2d2d4a;
    border-radius: 20px;
    padding: 28px 24px;
    margin-bottom: 16px;
  }
  .question-num {
    font-size: 11px;
    color: #7c3aed;
    font-weight: 600;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }
  .question-text {
    font-size: 17px;
    font-weight: 600;
    color: #f3f4f6;
    margin-bottom: 20px;
    line-height: 1.5;
  }
  .option {
    display: block;
    width: 100%;
    text-align: left;
    background: #1e1e38;
    border: 1.5px solid #374151;
    border-radius: 12px;
    padding: 13px 16px;
    color: #d1d5db;
    font-size: 14px;
    cursor: pointer;
    margin-bottom: 10px;
    transition: all 0.15s;
    line-height: 1.5;
  }
  .option:hover {
    border-color: #7c3aed;
    background: #252550;
    color: #e9d5ff;
  }
  .option.selected {
    border-color: #7c3aed;
    background: rgba(124,58,237,0.15);
    color: #c4b5fd;
  }

  /* 结果页 */
  .result-card { display: none; text-align: center; padding: 20px 0; }
  .result-card.show { display: block; }
  .result-type-icon { font-size: 64px; margin-bottom: 16px; }
  .result-type-name {
    font-size: 24px;
    font-weight: 800;
    background: linear-gradient(135deg, #a78bfa, #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
  }
  .result-percent {
    font-size: 13px;
    color: #6b7280;
    margin-bottom: 20px;
  }
  .result-desc {
    background: #16162a;
    border: 1px solid #2d2d4a;
    border-radius: 16px;
    padding: 20px;
    text-align: left;
    margin-bottom: 20px;
  }
  .result-desc p {
    font-size: 14px;
    color: #c9d1d9;
    line-height: 1.8;
    margin-bottom: 12px;
  }
  .result-desc p:last-child { margin-bottom: 0; }
  .result-tip {
    background: rgba(124,58,237,0.12);
    border: 1px solid rgba(124,58,237,0.3);
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 13px;
    color: #c4b5fd;
    line-height: 1.7;
    text-align: left;
    margin-bottom: 20px;
  }
  .recalc-btn {
    background: transparent;
    border: 1.5px solid #374151;
    color: #9ca3af;
    border-radius: 10px;
    padding: 12px 24px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .recalc-btn:hover { border-color: #7c3aed; color: #c4b5fd; }
  .share-btn {
    background: linear-gradient(135deg, #7c3aed, #db2777);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 12px 28px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-left: 10px;
    transition: transform 0.15s;
  }
  .share-btn:hover { transform: translateY(-1px); }
  .tag-line {
    font-size: 11px;
    color: #4b5563;
    margin-top: 20px;
  }
</style>
</head>
<body>
<div class="container">

  <!-- 封面 -->
  <div class="cover" id="cover">
    <span class="cover-icon">🌑</span>
    <h1>荣格阴影人格测试</h1>
    <p class="subtitle">
      你知道自己压抑了多少"不该有"的欲望、愤怒和软弱吗？<br>
      荣格说：被推进阴影的东西不会消失<br>
      它只会在你最脆弱的时候跳出来控制你
    </p>
    <button class="start-btn" onclick="startQuiz()">开始测试 →</button>
    <p class="tag-line">约3分钟 · 基于荣格分析心理学</p>
  </div>

  <!-- 问题区 -->
  <div id="quizArea" style="display:none;">
    <div class="progress">
      <div class="progress-bar-bg"><div class="progress-bar" id="progressBar"></div></div>
      <div class="progress-text" id="progressText">1/8</div>
    </div>
    <div class="question-card" id="questionCard"></div>
  </div>

  <!-- 结果区 -->
  <div class="result-card" id="resultCard">
    <div class="result-type-icon" id="resultIcon">🌑</div>
    <div class="result-type-name" id="resultName"></div>
    <div class="result-percent" id="resultPercent"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="result-tip" id="resultTip"></div>
    <button class="recalc-btn" onclick="resetQuiz()">重新测试</button>
    <button class="share-btn" onclick="shareResult()">分享结果</button>
    <p class="tag-line" style="margin-top:16px">你的阴影不会消失，但你可以认识它</p>
  </div>

</div>

<script>
const questions = [
  {
    text: "你在人群中突然成为焦点，所有人都在看你。你第一反应是：",
    options: [
      { label: "假装淡定，心里却在想大家怎么看我", score: { d: 2, r: 1, p: 0 } },
      { label: "感到兴奋，想展示最好的自己", score: { d: 1, r: 2, p: 0 } },
      { label: "想找个地缝钻进去", score: { d: 0, r: 0, p: 2 } }
    ]
  },
  {
    text: "你最嫉妒身边的人是什么样的？",
    options: [
      { label: "比我成功、比我有钱的人", score: { d: 2, r: 1, p: 1 } },
      { label: "比我自由、比我洒脱的人", score: { d: 1, r: 2, p: 0 } },
      { label: "好像什么都不羡慕，活得很平静的人", score: { d: 0, r: 1, p: 2 } }
    ]
  },
  {
    text: "你在愤怒的时候通常会怎么做？",
    options: [
      { label: "压抑下去，告诉自己不要计较", score: { d: 2, r: 0, p: 1 } },
      { label: "直接爆发，事后后悔", score: { d: 0, r: 2, p: 1 } },
      { label: "转移到别的事情上，比如狂吃或狂买东西", score: { d: 1, r: 0, p: 2 } }
    ]
  },
  {
    text: "你觉得自己最不敢承认的欲望是？",
    options: [
      { label: "想要权力，想要被人崇拜", score: { d: 2, r: 1, p: 0 } },
      { label: "想要彻底躺平，不想再努力", score: { d: 1, r: 0, p: 2 } },
      { label: "其实很渴望被爱、被看见", score: { d: 0, r: 2, p: 1 } }
    ]
  },
  {
    text: "朋友在背后说你坏话，被你偶然发现了。你会？",
    options: [
      { label: "假装不知道，但心里记下了这笔账", score: { d: 2, r: 0, p: 1 } },
      { label: "当面找他对质，要一个说法", score: { d: 0, r: 2, p: 0 } },
      { label: "反思自己是不是真的做错了什么", score: { d: 1, r: 0, p: 2 } }
    ]
  },
  {
    text: "你在深夜独自一人的时候，最常感受到的情绪是？",
    options: [
      { label: "空虚，不知道今天忙了些什么", score: { d: 1, r: 0, p: 2 } },
      { label: "焦虑，对明天的担心止不住地涌上来", score: { d: 2, r: 1, p: 0 } },
      { label: "平静，终于可以不用演了", score: { d: 0, r: 1, p: 2 } }
    ]
  },
  {
    text: "你身边的人对你的评价通常是？",
    options: [
      { label: "脾气好、很随和、从不发火", score: { d: 2, r: 0, p: 1 } },
      { label: "有主见、执行力强、目标导向", score: { d: 0, r: 2, p: 0 } },
      { label: "善良、乐于助人、老好人", score: { d: 1, r: 0, p: 2 } }
    ]
  },
  {
    text: "想象你有机会变成任何人，代价是永远不能再做真实的自己。你会？",
    options: [
      { label: "不换，我不想成为别人", score: { d: 0, r: 1, p: 1 } },
      { label: "换，我早就受够了现在的自己", score: { d: 2, r: 0, p: 0 } },
      { label: "犹豫，其实我也说不清自己是什么样的人", score: { d: 1, r: 0, p: 2 } }
    ]
  },
];

const results = {
  d: {
    name: "压抑阴影型",
    icon: "🫧",
    desc: "你的阴影被压得很深。你是所有人眼里的\"老好人\"——脾气好、随和、从不发火。但这其实不是平静，是冻结。你把愤怒、嫉妒、欲望全部推进了潜意识。它会在你最脆弱的时候爆发——情绪崩溃、对亲人发火、或深夜的空虚感。",
    tip: "荣格建议你：不要评判阴影，而是承认它。愤怒正常，嫉妒是对需求的信号。下次感到\"不该有这种情绪\"时，先承认它的存在，再问它想告诉你什么。"
  },
  r: {
    name: "整合阴影型",
    icon: "🔥",
    desc: "你对自己的阴影有相当程度的觉察。你知道自己的愤怒和欲望，也不害怕让它们出来。你走在个性化进程的正确道路上。但要小心：主动表达阴影和被阴影控制是两件事。有时候你以为在做自己，其实是阴影在操纵你。",
    tip: "荣格建议你：持续观察，而非释放。个性化是一生的过程。今天你能认出阴影，明天要学会不被它劫持。保持觉知，是最好的整合。"
  },
  p: {
    name: "阴影投射型",
    icon: "🔍",
    desc: "你不太容易感受到自己的阴影，但它经常\"装在\"别人身上出现。你讨厌某人自私、攻击性、冷漠——这些是你自己阴影的投射。你在别人身上看到了自己不敢承认的部分。最典型：你总觉得某类人特别让你受不了。荣格会说：让你受不了的，恰恰是你最不接受自己的那部分。",
    tip: "荣格建议你：下次对某人产生强烈厌恶感时，先暂停。问自己：这件事里，有没有我也有的、但我不愿承认的部分？不是认同那个人的行为，而是借这个反应探查自己的阴影。"
  },
};

let current = 0;
let scores = { d: 0, r: 0, p: 0 };

function startQuiz() {
  document.getElementById('cover').style.display = 'none';
  document.getElementById('quizArea').style.display = 'block';
  showQuestion();
}

function showQuestion() {
  const q = questions[current];
  const pct = ((current) / questions.length * 100).toFixed(0);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = (current + 1) + '/' + questions.length;
  let html = '<div class="question-num">Q' + (current + 1) + '</div><div class="question-text">' + q.text + '</div>';
  q.options.forEach(function(opt, i) {
    html += '<button class="option" onclick="selectOption(' + i + ',this)">' + opt.label + '</button>';
  });
  document.getElementById('questionCard').innerHTML = html;
}

function selectOption(idx, el) {
  document.querySelectorAll('.option').forEach(function(b) { b.classList.remove('selected'); });
  el.classList.add('selected');
  var score = questions[current].options[idx].score;
  scores.d += score.d;
  scores.r += score.r;
  scores.p += score.p;
  setTimeout(function() {
    current++;
    if (current >= questions.length) {
      showResult();
    } else {
      showQuestion();
    }
  }, 300);
}

function showResult() {
  document.getElementById('quizArea').style.display = 'none';
  var resultKey = Object.keys(scores).reduce(function(a, b) { return scores[a] >= scores[b] ? a : b; });
  var r = results[resultKey];
  var total = scores.d + scores.r + scores.p;
  var pct = (scores[resultKey] / total * 100).toFixed(0);
  document.getElementById('resultIcon').textContent = r.icon;
  document.getElementById('resultName').textContent = r.name;
  document.getElementById('resultPercent').textContent = '阴影整合度 ' + pct + '%';
  document.getElementById('resultDesc').innerHTML = r.desc;
  document.getElementById('resultTip').innerHTML = r.tip;
  document.getElementById('resultCard').classList.add('show');
}

function resetQuiz() {
  current = 0;
  scores = { d: 0, r: 0, p: 0 };
  document.getElementById('resultCard').classList.remove('show');
  document.getElementById('quizArea').style.display = 'block';
  document.getElementById('progressBar').style.width = '0%';
  showQuestion();
}

function shareResult() {
  var resultKey = Object.keys(scores).reduce(function(a, b) { return scores[a] >= scores[b] ? a : b; });
  var r = results[resultKey];
  var total = scores.d + scores.r + scores.p;
  var pctVal = (scores[resultKey] / total * 100).toFixed(0);
  var text = '\u6211\u5728\u505A\u8363\u683C\u9634\u5F71\u4EBA\u683C\u6D4B\u8BD5\uFF0C\u7ED3\u679C\u662F"' + r.name + '"\uD83D\uDD0B ' + pctVal + '%\u6574\u5408\u5EA6\u3002' + r.tip.split('\u3002')[0] + '\u4F60\u4E5F\u6765\u8BD5\u8BD5\uFF1F';
  if (navigator.share) {
    navigator.share({ title: '\u8363\u683C\u9634\u5F71\u4EBA\u683C\u6D4B\u8BD5', text: text });
  } else {
    navigator.clipboard.writeText(text).then(function() { alert('\u7ED3\u679C\u5DF2\u590D\u5236\u5230\u526A\u8D34\u677F\uFF01'); });
  }
}
</script>
</body>
</html>
