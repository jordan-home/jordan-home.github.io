<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小红书标题 CES 评分器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #fff5f5;
    min-height: 100vh;
    padding: 20px;
  }
  .container {
    max-width: 600px;
    margin: 0 auto;
  }
  h1 {
    text-align: center;
    color: #ff2442;
    font-size: 22px;
    margin-bottom: 8px;
  }
  .subtitle {
    text-align: center;
    color: #666;
    font-size: 13px;
    margin-bottom: 24px;
  }
  .input-card {
    background: white;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 2px 12px rgba(255,36,66,0.08);
    margin-bottom: 16px;
  }
  textarea {
    width: 100%;
    border: 1.5px solid #ffd0d6;
    border-radius: 10px;
    padding: 12px;
    font-size: 15px;
    resize: none;
    height: 80px;
    outline: none;
    transition: border-color 0.2s;
    color: #333;
  }
  textarea:focus { border-color: #ff2442; }
  .hint {
    font-size: 11px;
    color: #aaa;
    margin-top: 6px;
    text-align: right;
  }
  .analyze-btn {
    width: 100%;
    background: linear-gradient(135deg, #ff2442, #ff6b81);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 20px;
    transition: transform 0.1s, box-shadow 0.2s;
  }
  .analyze-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(255,36,66,0.3);
  }
  .analyze-btn:active { transform: translateY(0); }
  .result-card {
    background: white;
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 2px 12px rgba(255,36,66,0.08);
    display: none;
  }
  .score-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    margin: 0 auto 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    transition: background 0.4s;
  }
  .score-number {
    font-size: 36px;
    font-weight: 800;
    color: white;
    line-height: 1;
  }
  .score-label {
    font-size: 11px;
    color: rgba(255,255,255,0.85);
    margin-top: 4px;
  }
  .score-desc {
    text-align: center;
    font-size: 15px;
    color: #444;
    margin-bottom: 20px;
    font-weight: 500;
  }
  .breakdown {
    border-top: 1px solid #f5f5f5;
    padding-top: 16px;
  }
  .breakdown-title {
    font-size: 12px;
    color: #999;
    margin-bottom: 12px;
  }
  .dim-row {
    display: flex;
    align-items: center;
    margin-bottom: 10px;
    gap: 10px;
  }
  .dim-name {
    font-size: 13px;
    color: #555;
    width: 60px;
  }
  .dim-bar-bg {
    flex: 1;
    height: 8px;
    background: #f0f0f0;
    border-radius: 4px;
    overflow: hidden;
  }
  .dim-bar {
    height: 100%;
    border-radius: 4px;
    transition: width 0.6s ease;
  }
  .dim-score {
    font-size: 12px;
    color: #999;
    width: 28px;
    text-align: right;
  }
  .suggestion {
    margin-top: 16px;
    background: #fff9f0;
    border-radius: 10px;
    padding: 14px;
    font-size: 13px;
    color: #666;
    line-height: 1.6;
  }
  .suggestion strong { color: #e07b10; }
</style>
</head>
<body>
<div class="container">
  <h1>📊 小红书标题 CES 评分器</h1>
  <p class="subtitle">CES = Curiosity · Emotion · Self 三大维度评分</p>

  <div class="input-card">
    <textarea id="titleInput" placeholder="输入你的小红书标题..." maxlength="50"></textarea>
    <div class="hint"><span id="charCount">0</span>/50</div>
  </div>

  <button class="analyze-btn" onclick="analyze()">分析标题质量</button>

  <div class="result-card" id="result">
    <div class="score-circle" id="scoreCircle">
      <div class="score-number" id="scoreNum">0</div>
      <div class="score-label">CES总分</div>
    </div>
    <div class="score-desc" id="scoreDesc"></div>
    <div class="breakdown">
      <div class="breakdown-title">各维度详细分析</div>
      <div class="dim-row">
        <div class="dim-name">🐟 好奇心</div>
        <div class="dim-bar-bg"><div class="dim-bar" id="barC" style="background:#6366f1"></div></div>
        <div class="dim-score" id="scoreC">0</div>
      </div>
      <div class="dim-row">
        <div class="dim-name">💢 情绪</div>
        <div class="dim-bar-bg"><div class="dim-bar" id="barE" style="background:#ff2442"></div></div>
        <div class="dim-score" id="scoreE">0</div>
      </div>
      <div class="dim-row">
        <div class="dim-name">🪞 自我</div>
        <div class="dim-bar-bg"><div class="dim-bar" id="barS" style="background:#10b981"></div></div>
        <div class="dim-score" id="scoreS">0</div>
      </div>
    </div>
    <div class="suggestion" id="suggestion"></div>
  </div>
</div>

<script>
const titleInput = document.getElementById('titleInput');
const charCount = document.getElementById('charCount');

titleInput.addEventListener('input', () => {
  charCount.textContent = titleInput.value.length;
});

function analyze() {
  const title = titleInput.value.trim();
  if (!title) return;

  const c = calcCuriosity(title);
  const e = calcEmotion(title);
  const s = calcSelf(title);
  const total = Math.round(c * 0.35 + e * 0.35 + s * 0.30);

  document.getElementById('result').style.display = 'block';
  document.getElementById('scoreNum').textContent = total;

  let color, desc;
  if (total >= 80) {
    color = '#10b981';
    desc = '🔥 爆款潜力极强！强烈建议发布';
  } else if (total >= 65) {
    color = '#f59e0b';
    desc = '✨ 不错的标题，有爆款潜力';
  } else if (total >= 50) {
    color = '#6366f1';
    desc = '😐 中等水平，稍作优化会更好';
  } else {
    color = '#94a3b8';
    desc = '😬 需要重新构思标题';
  }

  document.getElementById('scoreCircle').style.background = color;
  document.getElementById('scoreDesc').textContent = desc;

  document.getElementById('barC').style.width = c + '%';
  document.getElementById('barE').style.width = e + '%';
  document.getElementById('barS').style.width = s + '%';
  document.getElementById('scoreC').textContent = Math.round(c);
  document.getElementById('scoreE').textContent = Math.round(e);
  document.getElementById('scoreS').textContent = Math.round(s);

  document.getElementById('suggestion').innerHTML = getSuggestion(c, e, s);
}

function calcCuriosity(t) {
  const triggers = [
    /为什么|怎么|如何|什么|是不是|该不该|为何/, // 疑问
    /竟然|居然|万万没想到|秘密|真相|揭秘|曝光/, // 悬念
    /一个|两个|三个|四点|五步|六招|七个/, // 数字
    /原来|其实|终于|曝光|第一次|最后一个/, // 转折
    /藏不住|瞒不住|骗不了|躲不开/, // 反常识
    /秘密|真相|潜规则|冷知识/, // 揭秘感
  ];
  let score = 20;
  triggers.forEach(r => { if (r.test(t)) score += 12; });
  return Math.min(100, score);
}

function calcEmotion(t) {
  const strong = [
    /太|好|真的|绝了|炸了|爆了|哭了|笑死|气炸|emo|崩溃|窒息|心动|沦陷/,
    /一定|必须|千万|绝对/, /再也|永远/, /忍不住|控制不住/
  ];
  const mild = [
    /有点|有些|似乎|好像|大概|也许/,
    /可能|或许|应该/
  ];
  let score = 20;
  strong.forEach(r => { if (r.test(t)) score += 16; });
  mild.forEach(r => { if (r.test(t)) score += 6; });
  return Math.min(100, score);
}

function calcSelf(t) {
  const self = [
    /你|我|你的|我的|我们|自己|亲身|个人/,
    /我曾|我以为|我发现|我一直|我终于|我没|我不再/
  ];
  let score = 20;
  self.forEach(r => { if (r.test(t)) score += 14; });
  return Math.min(100, score);
}

function getSuggestion(c, e, s) {
  const parts = [];
  if (c < 50) parts.push('增加<strong>悬念或疑问</strong>，如"为什么..."、"原来..."');
  if (e < 50) parts.push('加入<strong>情绪强烈的词</strong>，如"太绝了"、"笑死"');
  if (s < 50) parts.push('加入<strong>自我代入</strong>视角，如"我"、"你"');
  if (parts.length === 0) return '👍 标题已具备良好的 CES 结构，可以直接使用！';
  return '💡 优化建议：' + parts.join('；') + '。';
}
</script>
</body>
</html>
